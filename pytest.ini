[pytest]
# FaceOff pytest configuration

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output and verbosity
addopts =
    -v
    --tb=short
    -ra
    --strict-markers

# Markers for categorizing tests
markers =
    unit: Unit tests (fast, isolated, no GPU required)
    integration: Integration tests (may require GPU or external resources)
    slow: Slow tests (processing large files)
    gpu: Tests that require CUDA GPU
    skip_ci: Tests to skip in CI environment

# Logging configuration during tests
log_cli = true
log_cli_level = WARNING
log_cli_format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
log_cli_date_format = %H:%M:%S

# Timeout for hanging tests (requires pytest-timeout)
# timeout = 120

# Coverage configuration (requires pytest-cov)
# To run with coverage: pytest --cov=core --cov=utils --cov=processing

# Filter warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
